name: CICD

on:
  workflow_dispatch:
  schedule:
    - cron: "0 03 * * *"
  push:
    branches: [main]
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Login to docker hub using secrets in GitHub.
      - name: Login to docker
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build for testing
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: tang:test

      - name: Test the image
        run: |
          docker run -d --name tang-test -p 8080:8080 tang:test
          sleep 5
          curl -f http://localhost:8080/adv
          docker stop tang-test
          docker rm tang-test

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm/v7,linux/arm64
          push: true
          tags: kvalitetsit/tang:latest,kvalitetsit/tang:${{ github.sha }}
          sbom: true
          provenance: true

      - name: Is Tag Build
        id: tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_OUTPUT

      - name: Build and test helm chart
        run: ./build/build-helm.sh tang ${{ steps.tag.outputs.VERSION }} ${{ steps.tag.outputs.VERSION }}

      - name: Push tagged helm chart to repo
        if: ${{ steps.tag.conclusion != 'skipped' }}
        run: ./build/push-repo.sh ${{ secrets.KIT_GITHUB_ACCESS }}
